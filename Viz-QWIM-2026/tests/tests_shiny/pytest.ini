[pytest]
# Standalone pytest configuration for the QWIM Shiny test suite.
# Run from the project root:
#   pytest tests/tests_shiny/ -p no:cacheprovider --import-mode=importlib
#
# Or activate the venv first and run with the --override approach from main
# pytest.ini:
#   pytest tests/tests_shiny/ --override-ini="norecursedirs="

pythonpath = .
testpaths = tests/tests_shiny
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --import-mode=importlib
    -ra
    --tb=short
    --color=yes

markers =
    unit:        fast tests that exercise pure Python functions
    integration: tests that load data files from disk (may be slow)
    playwright:  browser-based end-to-end tests via Playwright
    smoke:       quick sanity checks — subset of unit/playwright
    regression:  regression tests verifying known-good output against benchmarks

filterwarnings =
    error::pytest.PytestUnraisableExceptionWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning:shinychat
    ignore::ResourceWarning
