# isort configuration
[tool.ruff.lint.isort]
known-first-party = ["src", "dashboard", "tests"]
known-third-party = ["polars", "plotly", "shiny", "pydantic", "pytest"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
combine-as-imports = true
force-wrap-aliases = true
split-on-trailing-comma = true
lines-after-imports = 2
lines-between-types = 1
forced-separate = ["tests"]
relative-imports-order = "closest-to-furthest"

# pydocstyle configuration
[tool.ruff.lint.pydocstyle]
convention = "numpy"

# flake8-quotes configuration
[tool.ruff.lint.flake8-quotes]
docstring-quotes = "double"
inline-quotes = "double"
multiline-quotes = "double"

# flake8-type-checking configuration
[tool.ruff.lint.flake8-type-checking]
strict = true
runtime-evaluated-base-classes = ["pydantic.BaseModel"]
runtime-evaluated-decorators = ["pydantic.validate_call"]

# flake8-pytest-style configuration
[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = true
mark-parentheses = true
parametrize-names-type = "tuple"
parametrize-values-type = "list"

# flake8-tidy-imports configuration
[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "parents"

# flake8-import-conventions
[tool.ruff.lint.flake8-import-conventions.aliases]
"polars" = "pl"
"numpy" = "np"
"pandas" = "pd"
"plotly.express" = "px"
"plotly.graph_objects" = "go"

# pylint configuration
[tool.ruff.lint.pylint]
max-args = 8
max-branches = 15
max-returns = 6
max-statements = 50
max-public-methods = 25
allow-magic-value-types = ["int", "str", "bytes"]

# Formatting configuration
[tool.ruff.format]
# Like Black, use double quotes for strings
quote-style = "double"

# Like Black, indent with spaces, rather than tabs
indent-style = "space"

# Like Black, respect magic trailing commas
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending
line-ending = "auto"

# Enable reformatting of code snippets in docstrings
docstring-code-format = true

# Use same line length for docstring code snippets
docstring-code-line-length = "dynamic"

# Exclude files from formatting
exclude = ["*.pyi"]

# ==============================================================================
# UV - Package Management Configuration
# ==============================================================================
[tool.uv]
# Package version constraints
constraint-dependencies = [
    "kaleido!=0.2.1.post1",  # Known buggy version
]

# Default Python version for virtual environments
python-preference = "managed"

# Enable dependency caching
cache-dir = ".uv_cache"

# Package index configuration
index-url = "https://pypi.org/simple"
extra-index-url = []

# Install options
reinstall = false
upgrade = false

# Resolver settings
resolution = "highest"
prerelease = "if-necessary-or-explicit"   #"disallow"

# Environment settings
native-tls = true

# Exclude packages from dependency resolution
override-dependencies = []

[tool.uv.pip]
# Compile bytecode during installation for faster imports
compile-bytecode = true

# Verify package hashes
require-hashes = false

# Allow installation of pre-release versions (when explicitly requested)
# prerelease = "explicit"

# Strict mode for dependency resolution
strict = false

# System site-packages access
system = false

# ==============================================================================
# TY - Type Checking Configuration (Red Knot / ty)
# ==============================================================================
[tool.ty]
# ty configuration: https://github.com/astral-sh/ty

[tool.ty.environment]
# Python version for type checking
python-version = "3.12"

[tool.ty.rules]
# Core type checking rules
# Note: ty doesn't support aenum's Enum, so some warnings are expected when using aenum
# Also sys.stdout.reconfigure() is runtime-only and ty lacks stubs for it

# Ignore these for modules using aenum or runtime-specific features:
unsupported-base = "ignore"  # aenum.Enum isn't recognized
call-non-callable = "ignore"  # sys.stdout.reconfigure() is runtime-only
invalid-assignment = "ignore"  # aenum auto() values aren't recognized
invalid-parameter-default = "ignore"  # aenum auto() defaults
invalid-argument-type = "ignore"  # aenum enum members
possibly-missing-attribute = "ignore"  # aenum .value access isn't recognized
invalid-return-type = "ignore"         # aenum enum members in list returns aren't fully typed
unused-type-ignore-comment = "ignore"  # pyright-targeted type: ignore comments are needed for pyright even if ty doesn't see errors

# Keep enabled for general type safety
unresolved-import = "warn"
division-by-zero = "error"

# ==============================================================================
# PYREFLY Configuration
# ==============================================================================

[tool.pyrefly]
# pyrefly type checker: https://github.com/facebook/pyrefly
# The project uses ``src.`` prefix imports so the project root must be on
# the search path, not just ``src/`` which pyrefly infers by default.
search_path = ["."]

# ==============================================================================
# PREK - Pre-commit Procedures Configuration
# ==============================================================================
# NOTE: "prek" is not a standard Python package. If you meant "pre-commit",
# it uses .pre-commit-config.yaml instead of pyproject.toml sections.
# Below is a placeholder for custom pre-commit-like tool configuration.
# Consider using: https://pre-commit.com/ with a .pre-commit-config.yaml file

[tool.prek]
# Placeholder for custom pre-commit procedures
# Replace with actual configuration if "prek" is a custom/internal tool

# Enable/disable pre-commit hooks
enabled = true

# Hooks to run before commits
hooks = [
    "ruff-check",      # Run ruff linting
    "ruff-format",     # Run ruff formatting
    "ty-check",        # Run type checking
    "pytest-unit",     # Run unit tests
]

# Files to check
include = ["*.py"]
exclude = [".venv/*", "build/*", "dist/*"]

# Fail-fast: stop on first error
fail-fast = false

# Verbose output
verbose = false

# Auto-fix issues when possible
auto-fix = false

# Skip hooks for certain commit messages (regex patterns)
skip-on-commit-msg = [
    "^WIP:",           # Work in progress
    "^FIXUP:",         # Fixup commits
    "^\\[skip ci\\]",  # Skip CI marker
]
