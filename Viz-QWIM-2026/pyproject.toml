# ==============================================================================
# PYTEST - Testing Configuration
# ==============================================================================
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Additional command-line options
addopts = [
    "-p", "no:langsmith",           # Disable langsmith plugin
    "-ra",                          # Show extra test summary info for all except passed
    "--strict-markers",             # Fail on unknown markers
    "--strict-config",              # Fail on config parsing warnings
    "-v",                           # Verbose output
    "--tb=short",                   # Shorter traceback format
    "--color=yes",                  # Force color output
]

# Test markers for categorization
markers = [
    "unit: marks tests as unit tests (fast, no external dependencies)",
    "integration: marks tests as integration tests (may use external resources)",
    "slow: marks tests as slow (excluded from regular test runs with -m 'not slow')",
    "regression: marks tests as regression tests (compare against known values)",
    "smoke: marks tests as smoke tests (quick sanity checks)",
    "e2e: marks tests as end-to-end tests (full workflow tests)",
    "parametrize: marks tests using parametrization",
    "wip: marks tests as work-in-progress (can be skipped)",
]

# Filter warnings during test runs
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    "error::pytest.PytestUnraisableExceptionWarning",
]

# Minimum pytest version required
minversion = "8.0"

# Logging configuration for tests
log_cli = false
log_cli_level = "WARNING"
log_cli_format = "%(asctime)s [%(levelname)8s] %(name)s: %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"

# Console output width
console_output_style = "progress"

# Fail fast settings (uncomment to enable)
# norecursedirs = [".git", ".tox", "dist", "build", "*.egg", "venv", ".venv"]

# Async mode for pytest-asyncio (if used)
asyncio_mode = "auto"

# ==============================================================================
# RUFF - Linting and Formatting Configuration
# ==============================================================================
[tool.ruff]
# Target Python version
target-version = "py312"

# Same line length as Black
line-length = 100

# Exclude commonly ignored directories
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    "*.egg-info",
    ".pytest_cache",
    "migrations",
]

# Files with these extensions will be checked
include = ["*.py", "*.pyi", "*.pyx", "*.ipynb"]

# Respect gitignore files
respect-gitignore = true

# Fix violations automatically when possible (use with caution)
fix = false

# Show fixes in output
show-fixes = true

# Output format
output-format = "concise"

# Allow imports relative to these directories
src = ["src", "tests"]

# Force exclusion even if files passed explicitly
force-exclude = true

