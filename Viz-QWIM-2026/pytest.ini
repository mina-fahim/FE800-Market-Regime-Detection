# ==============================================================================
# pytest configuration — AUTHORITATIVE source (takes precedence over pyproject.toml)
# ==============================================================================
# Mirrors [tool.pytest.ini_options] in pyproject.toml.  When the two diverge,
# this file wins.  Keep them in sync or remove the pyproject.toml section.
# ==============================================================================

[pytest]

# --- Python path & discovery ---------------------------------------------------
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test* Class_Test_*
python_functions = test_* Test_*

# --- Directories excluded from recursive collection ----------------------------
# CRITICAL: tests_behave / tests_robot_framework / tests_shiny use their own
# runners (behave, robot, shiny-pytest).  Letting pytest crawl them causes
# import errors on modules those frameworks provide.  Keep them out.
norecursedirs =
    .git
    .tox
    .venv
    __pycache__
    node_modules
    dist
    build
    *.egg
    tests/tests_behave
    tests/tests_robot_framework
    tests/tests_shiny

# --- Command-line defaults -----------------------------------------------------
# CRITICAL: With 100+ pytest plugins installed, the -p no:* flags disable
# plugin autoloading to prevent argparse and fixture-name conflicts.
addopts =
    -p no:cacheprovider
    -p no:randomly
    -p no:json-report
    -p no:allure_pytest
    -p no:langsmith
    --import-mode=importlib
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --color=yes

# --- Version gate --------------------------------------------------------------
minversion = 8.0

# --- Marker definitions --------------------------------------------------------
# --strict-markers will reject any marker not listed here (catches typos).
markers =
    unit: marks tests as unit tests (fast, no external dependencies)
    integration: marks tests as integration tests (may use external resources)
    slow: marks tests as slow (excluded from regular test runs with -m 'not slow')
    regression: marks tests as regression tests (compare against known values)
    smoke: marks tests as smoke tests (quick sanity checks)
    e2e: marks tests as end-to-end tests (full workflow tests)
    wip: marks tests as work-in-progress (can be skipped with -m 'not wip')

# --- xfail behaviour -----------------------------------------------------------
# If a test marked @pytest.mark.xfail unexpectedly passes, treat it as a failure
# so known-broken tests get cleaned up promptly.
xfail_strict = true

# --- Warning filters -----------------------------------------------------------
# Evaluated top-to-bottom; first match wins.
filterwarnings =
    error::pytest.PytestUnraisableExceptionWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning:shinychat
    ignore::ResourceWarning

# --- Logging (live CLI output during tests) ------------------------------------
log_cli = false
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# --- Console display -----------------------------------------------------------
console_output_style = progress